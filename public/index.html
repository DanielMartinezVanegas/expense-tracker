<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>Expense Tracker</h1>
    <p>Track your spending in one simple dashboard</p>
  </header>

  <main class="container">
    <section class="card" id="form-card">
    <h2 id="form-title">Add Expense</h2>
    <form id="expense-form">
        <input type="hidden" id="expense-id">

        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" required>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="">Select category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" step="0.01" min="0" required>
        </div>

        <div class="form-group">
          <label for="expense_date">Date</label>
          <input type="date" id="expense_date" required>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" rows="3"></textarea>
        </div>

    <div class="button-group">
    <button type="submit" id="submit-button">Save Expense</button>
    <button type="button" id="cancel-edit" class="secondary">Cancel</button>
    </div>
      </form>

      <p id="message"></p>
    </section>

        <section class="card">
        <h2>Summary</h2>
        <div id="total-spent" class="summary-box">$0.00</div>

        <h3>By Category</h3>
        <ul id="category-summary" class="summary-list"></ul>

        <h3>By Month</h3>
        <ul id="monthly-summary" class="summary-list"></ul>
        </section>
        
    <section class="card">
     <h2>All Expenses</h2>

   <div class="controls-bar">
  <div class="filter-bar">
    <label for="category-filter">Filter by Category</label>
    <select id="category-filter">
      <option value="All">All Categories</option>
      <option value="Food">Food</option>
      <option value="Transport">Transport</option>
      <option value="Bills">Bills</option>
      <option value="Entertainment">Entertainment</option>
      <option value="Shopping">Shopping</option>
      <option value="Health">Health</option>
      <option value="Other">Other</option>
    </select>
  </div>

  <div class="filter-bar">
    <label for="sort-expenses">Sort By</label>
    <select id="sort-expenses">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="highest">Highest Amount</option>
      <option value="lowest">Lowest Amount</option>
      <option value="title">Title A-Z</option>
    </select>
  </div>
</div>

  <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Amount</th>
              <th>Date</th>
              <th>Description</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="expense-list"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
